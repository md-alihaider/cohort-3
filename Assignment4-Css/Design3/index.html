<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Designing Brand</title>
    <link rel="stylesheet" href="style.css" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <div class="left-top"></div>
      <div class="left-bottom">
        <div class="part1">
          <h1>Smart Digital <br> Agency For Your <br> <span>Business</span></h1>
          <div class="arrow"><i class="ri-arrow-right-up-line"></i></div>
        </div>
        <div class="part2">
          <div class="part2-left">
            <img src="https://i.podnews.network/r/a/2048/submit-a-podcast.jpeg" alt="">
          </div>
          <div class="part2-right">
            <img src="https://holaworld.in/_next/image?url=https://admin.holaworld.in/uploads/image_13_cf2873bf18.png&w=3840&q=75" alt="">
          </div>
        </div>
        <div class="part3">
          <div class="bottom-stack">
            <img
              src="https://plus.unsplash.com/premium_photo-1683140820086-0dc208d23ab2?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjF8fHBvcnRyYWl0fGVufDB8fDB8fHww"
            />
            <img
              src="https://images.unsplash.com/photo-1506863530036-1efeddceb993?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MjB8fHBvcnRyYWl0fGVufDB8fDB8fHww"
            />
            <img
              src="https://images.unsplash.com/photo-1614204424926-196a80bf0be8?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MTJ8fHBvcnRyYWl0fGVufDB8fDB8fHww"
            />
            <div class="bottom-count">+</div>
          </div>
        </div>
      </div>
      <div class="top1"></div>
      <div class="top2"></div>
      <div class="center">
        <div class="circle"></div>
        <img
          src="https://cdn.prod.website-files.com/645e7b988043cf27c72d8a60/657d1d533e44cc3168b4067f_person22.webp"
          alt=""
        />
        <img src="./assets/bar-chart.png" alt="" class="bar-chart" />
        <img src="./assets/growth-chart.png" alt="" class="growth-chart" />
        <img src="./assets/total-plays.png" alt="" class="total-plays" />
        <img
          src="./assets/engagement-chart.png"
          alt=""
          class="engagement-chart"
        />
      </div>
      <div class="right-top">
        <div class="right-top-up">
          <h1>
            Team of passionate <br />
            designers and <br />
            developers
          </h1>
          <div class="avatar-stack">
            <img
              src="https://images.unsplash.com/photo-1500648767791-00dcc994a43e?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8cG9ydHJhaXR8ZW58MHx8MHx8fDA%3D"
              alt="Team member"
            />
            <img
              src="https://plus.unsplash.com/premium_photo-1671656349322-41de944d259b?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8cG9ydHJhaXR8ZW58MHx8MHx8fDA%3D"
              alt="Team member"
            />
            <img
              src="https://images.unsplash.com/photo-1580489944761-15a19d654956?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8N3x8cG9ydHJhaXR8ZW58MHx8MHx8fDA%3D"
              alt="Team member"
            />
            <img
              src="https://plus.unsplash.com/premium_photo-1683121771856-3c3964975777?w=500&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8cG9ydHJhaXR8ZW58MHx8MHx8fDA%3D"
              alt="Team member"
            />
            <div class="avatar-count">+2</div>
          </div>
        </div>
        <div class="line"></div>
        <div class="right-top-down">
          <div class="left">
            <h2>
              Daily <br />
              New clients
            </h2>
            <h1>54</h1>
            <p>
              <span>+40% <i class="ri-arrow-right-up-line"></i></span> <br />vs yesterday
            </p>
          </div>
          <div class="right">
            <i class="ri-contacts-line"></i>
          </div>
        </div>
      </div>
      <div class="right-bottom"></div>
      <div class="bottom1"></div>
      <div class="bottom2"></div>
    </main>
  </body>
</html>
